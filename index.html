<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slart's Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6c63ff;
      --accent-dim: #3d3880;
      --text: #e2e4f0;
      --muted: #7c7f96;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 1.75rem;
      line-height: 1;
    }

    .card-icon img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .card-desc {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-tag {
      display: inline-block;
      margin-top: auto;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      background: var(--accent-dim);
      color: #b8b4ff;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      width: fit-content;
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Slart's <span>Tools</span></h1>
    <p>A collection of handy web utilities.</p>
  </header>

  <main class="grid">

    <!--
      Tool card template — duplicate and fill in per tool:

      <a class="card" href="./tool-folder/">
        <div class="card-icon">🔧</div>
        <div class="card-name">Tool Name</div>
        <div class="card-desc">Short description of what this tool does.</div>
        <span class="card-tag">Category</span>
      </a>
    -->



      <a class="card" href="./wav_analyzer/index.html">
        <div class="card-icon"><img src="./wav_analyzer/icon.png" alt="" /></div>
        <div class="card-name">WAV Analyzer</div>
        <div class="card-desc">Analyze WAV files.</div>
        <span class="card-tag">Audio tools</span>
      </a>

      <a class="card" href="./rpp_analyzer/index.html">
        <div class="card-icon"><img src="./rpp_analyzer/icon.png" alt="" /></div>
        <div class="card-name">Reaper RPP Analyzer</div>
        <div class="card-desc">Analyze RPP files.</div>
        <span class="card-tag">Audio tools</span>
      </a>

      <a class="card" href="./hertzkeys/index.html">
        <div class="card-icon">🎹</div>
        <div class="card-name">HertzKeys</div>
        <div class="card-desc">HertzKeys</div>
        <span class="card-tag">Audio instruments</span>
      </a>

  </main>

  <footer>
    <p>slarthub.github.io</p>
  </footer>

</body>
</html>
